<div class="home-container">
  <h1>Chess Game Analysis</h1>
  
  @if (loading()) {
    <p>Loading games from backend...</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
  } @else {
    <div class="games-status">
      <p>Total games fetched: <strong>{{ games().length }}</strong></p>
    </div>

    <div class="games-grid">
      @for (game of games(); track game.id) {
        <div class="game-card">
          <div class="game-info">
            <span class="game-id">#{{ game.id }}</span>
            <span class="game-players">{{ game.players.white }} vs {{ game.players.black }}</span>
          </div>
          <a [routerLink]="['/analyze', game.id]" class="analyze-btn">Analyze Game</a>
        </div>
      }
    </div>
  }
</div>

<style>
  /* ... existing styles ... */
  .games-grid {
    display: grid;
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .game-card {
    background: white;
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
  }
  .game-card:hover {
    border-color: #3498db;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .game-info {
    display: flex;
    flex-direction: column;
  }
  .game-id {
    font-size: 0.8rem;
    color: #888;
  }
  .game-players {
    font-weight: 500;
  }
  .analyze-btn {
    background: #3498db;
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  .analyze-btn:hover {
    background: #2980b9;
  }
  .home-container {
    padding: 2rem;
    max-width: 800px;
    margin: 0 auto;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  .error { color: #ff4444; }
  .analyzing { color: #3498db; }
  .completed { color: #2ecc71; }
  .analysis-output {
    background: #f8f9fa;
    padding: 1rem;
    border-radius: 8px;
    border: 1px solid #ddd;
    margin: 1rem 0;
  }
  .moves-text {
    font-family: monospace;
    background: #eee;
    padding: 0.5rem;
    border-radius: 4px;
    word-break: break-all;
  }
</style>
