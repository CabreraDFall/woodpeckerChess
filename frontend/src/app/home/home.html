<div class="home-container">
  <h1>Chess Game Analysis</h1>
  
  @if (loading()) {
    <p>Loading games from backend...</p>
  } @else if (error()) {
    <p class="error">{{ error() }}</p>
  } @else {
    <div class="games-status">
      <p>Total games fetched: <strong>{{ games().length }}</strong></p>
    </div>

    <div class="games-grid">
      @for (game of games(); track game.id) {
        <div class="game-card">
          <div class="game-info">
            <span class="game-id">#{{ game.id }}</span>
            <span class="game-players">{{ game.players.white }} vs {{ game.players.black }}</span>
          </div>
          <a [routerLink]="['/analyze', game.id]" class="analyze-btn">Analyze Game</a>
        </div>
      }
    </div>
  }
</div>

<style>
  /* ... existing styles ... */
  .games-grid {
    display: grid;
    gap: 1rem;
    margin-top: 1.5rem;
  }
  .game-card {
    background: var(--card);
    padding: 1rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.2s;
  }
  .game-card:hover {
    border-color: var(--primary);
    box-shadow: var(--shadow-sm);
  }
  .game-info {
    display: flex;
    flex-direction: column;
  }
  .game-id {
    font-size: 0.8rem;
    color: var(--muted-foreground);
  }
  .game-players {
    font-weight: 500;
  }
  .analyze-btn {
    background: var(--primary);
    color: var(--primary-foreground);
    padding: 0.5rem 1rem;
    border-radius: var(--radius-md);
    text-decoration: none;
    font-size: 0.9rem;
    transition: background 0.2s;
  }
  .analyze-btn:hover {
    opacity: 0.9;
  }
  .home-container {
    padding: 2rem;
    max-width: 800px;
    margin: 0 auto;
    font-family: var(--font-sans);
  }
  .error { color: var(--destructive); }
  .analyzing { color: var(--primary); }
  .completed { color: var(--chart-4); }
  .analysis-output {
    background: var(--muted);
    padding: 1rem;
    border-radius: var(--radius-lg);
    border: 1px solid var(--border);
    margin: 1rem 0;
  }
  .moves-text {
    font-family: var(--font-mono);
    background: var(--secondary);
    padding: 0.5rem;
    border-radius: var(--radius-sm);
    word-break: break-all;
  }
</style>
