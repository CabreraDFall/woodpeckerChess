<app-welcome-header [userName]="userName"></app-welcome-header>

<div class="dashboard-grid">
  <!-- Current Training Cycle -->
  <app-training-cycle-card
    [cycleName]="'January Strategic Set'"
    [cycleNumber]="2"
    [progress]="45"
    [totalPuzzles]="120"
    [daysRemaining]="12">
  </app-training-cycle-card>

  <!-- Performance -->
  <app-performance-card [stats]="performanceStats"></app-performance-card>

  <!-- Recent Puzzles -->
  <app-recent-puzzles-card [puzzles]="recentPuzzles"></app-recent-puzzles-card>

  <!-- Weekly Accuracy -->
  <app-weekly-accuracy-card></app-weekly-accuracy-card>
</div>
